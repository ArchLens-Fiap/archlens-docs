name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  dotnet-build-test:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ArchLens.sln
        working-directory: archlens

      - name: Build
        run: dotnet build ArchLens.sln --no-restore --configuration Release
        working-directory: archlens

      - name: Test
        run: dotnet test ArchLens.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
        working-directory: archlens

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: archlens/coverage/**/coverage.cobertura.xml

  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: archlens/src/AIProcessing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: archlens/src/AIProcessing/coverage.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: archlens/src/Frontend/archlens-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: archlens/src/Frontend/archlens-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [dotnet-build-test]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: archlens
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
