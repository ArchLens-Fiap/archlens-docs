name: CI

# Workflow de referencia para os repositorios do ArchLens.
# Cada repositorio tem seu proprio ci.yml adaptado ao tipo de projeto.
#
# .NET Services: dotnet restore -> build -> test (XPlat Coverage) -> Trivy -> Docker Build+Push GHCR
# Python (AI Processing): pip install -> pytest (--cov) -> Trivy -> Docker Build+Push GHCR
# Frontend (Next.js): npm ci -> lint -> build -> Trivy -> Docker Build+Push GHCR
# Contracts (Library): dotnet restore -> build -> Trivy (sem Docker)
#
# Triggers: push/PR em main
# Docker Build: apenas em push para main (nao em PRs)
# Security: Trivy filesystem scan + Trivy image scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-lint:
    name: Docs Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .github/mlc_config.json
        continue-on-error: true
