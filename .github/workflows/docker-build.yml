name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "archlens/src/**"
      - "archlens/docker-compose.yml"
      - "archlens/**/Dockerfile"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/archlens

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      upload: ${{ steps.changes.outputs.upload }}
      orchestrator: ${{ steps.changes.outputs.orchestrator }}
      report: ${{ steps.changes.outputs.report }}
      notification: ${{ steps.changes.outputs.notification }}
      auth: ${{ steps.changes.outputs.auth }}
      gateway: ${{ steps.changes.outputs.gateway }}
      ai: ${{ steps.changes.outputs.ai }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            upload:
              - 'archlens/src/Services/Upload/**'
              - 'archlens/src/SharedKernel/**'
              - 'archlens/src/Contracts/**'
            orchestrator:
              - 'archlens/src/Services/Orchestrator/**'
              - 'archlens/src/SharedKernel/**'
              - 'archlens/src/Contracts/**'
            report:
              - 'archlens/src/Services/Report/**'
              - 'archlens/src/SharedKernel/**'
              - 'archlens/src/Contracts/**'
            notification:
              - 'archlens/src/Services/Notification/**'
              - 'archlens/src/Contracts/**'
            auth:
              - 'archlens/src/Services/Auth/**'
              - 'archlens/src/SharedKernel/**'
            gateway:
              - 'archlens/src/ApiGateway/**'
            ai:
              - 'archlens/src/AIProcessing/**'
            frontend:
              - 'archlens/src/Frontend/**'

  build-dotnet:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        include:
          - service: upload-api
            context: archlens
            dockerfile: archlens/src/Services/Upload/ArchLens.Upload.Api/Dockerfile
            changed: ${{ needs.detect-changes.outputs.upload }}
          - service: orchestrator-api
            context: archlens
            dockerfile: archlens/src/Services/Orchestrator/ArchLens.Orchestrator.Api/Dockerfile
            changed: ${{ needs.detect-changes.outputs.orchestrator }}
          - service: report-api
            context: archlens
            dockerfile: archlens/src/Services/Report/ArchLens.Report.Api/Dockerfile
            changed: ${{ needs.detect-changes.outputs.report }}
          - service: notification-api
            context: archlens
            dockerfile: archlens/src/Services/Notification/ArchLens.Notification.Api/Dockerfile
            changed: ${{ needs.detect-changes.outputs.notification }}
          - service: auth-api
            context: archlens
            dockerfile: archlens/src/Services/Auth/ArchLens.Auth.Api/Dockerfile
            changed: ${{ needs.detect-changes.outputs.auth }}
          - service: gateway
            context: archlens
            dockerfile: archlens/src/ApiGateway/ArchLens.Gateway/Dockerfile
            changed: ${{ needs.detect-changes.outputs.gateway }}
    if: needs.detect-changes.outputs.upload == 'true' || needs.detect-changes.outputs.orchestrator == 'true' || needs.detect-changes.outputs.report == 'true' || needs.detect-changes.outputs.notification == 'true' || needs.detect-changes.outputs.auth == 'true' || needs.detect-changes.outputs.gateway == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Log in to GHCR
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

      - name: Trivy scan
        if: matrix.changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  build-ai:
    name: Build AI Processing
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ai == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: archlens/src/AIProcessing
          file: archlens/src/AIProcessing/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ai-processing:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ai-processing:latest

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: archlens/src/Frontend/archlens-web
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
